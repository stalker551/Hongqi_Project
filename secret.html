<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>рикролл</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #background-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            right: 0;
            bottom: 0;
            min-width: 90%;
            min-height: 90vh;
            object-fit: contain;
            width: auto;
            height: auto;
            z-index: -1;
        }
        
        .elegant-button {
            display: inline-block;
            background: transparent;
            border: 1px solid #f80303;
            padding: 18px 50px;
            color: #f80303;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .elegant-button:hover {
            background: #f80303;
            color: #ffffff;
        }

        .button-container {
            text-align: center;
            margin: 80px 0 40px;
        }
    </style>
</head>
<body>
    <video autoplay loop playsinline id="background-video">
        <source src="rickastley2.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="button-container">
            <a href="index.html" class="elegant-button">Закрыть пасхалку и вернуться на главную</a>
        </div>
</body>
</html>
